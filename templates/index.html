<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bremsstrahlung Calculator</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
</head>
<body>
    <header>
        <h1>Bremsstrahlung Calculator</h1>
        <p class="subtitle">Thick-target spectra &mdash; NASA TN D-4755 (Powell, 1968)</p>
    </header>
    <div class="app-layout">
        <!-- Controls Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="control-group">
                <label for="material-select">Material</label>
                <select id="material-select"></select>
            </div>
            <div class="control-group">
                <label for="energy-slider">Electron Energy (MeV)</label>
                <div class="slider-row">
                    <input type="range" id="energy-slider" min="0.1" max="10" step="0.01" value="1.0">
                    <input type="number" id="energy-input" min="0.1" max="10" step="0.01" value="1.0">
                </div>
            </div>
            <div class="control-group">
                <label for="angle-slider">Detection Angle (deg)</label>
                <div class="slider-row">
                    <input type="range" id="angle-slider" min="0" max="90" step="1" value="0">
                    <input type="number" id="angle-input" min="0" max="90" step="1" value="0">
                </div>
            </div>
            <div class="control-group">
                <label for="current-input">Beam Current</label>
                <div class="slider-row">
                    <input type="number" id="current-input" min="0" step="0.1" value="0" placeholder="0 = per electron">
                    <select id="current-unit">
                        <option value="ua">uA</option>
                        <option value="ma">mA</option>
                    </select>
                </div>
            </div>
            <div class="control-group">
                <label>Mode</label>
                <div class="radio-group">
                    <label><input type="radio" name="mode" value="both" checked> Both</label>
                    <label><input type="radio" name="mode" value="calculated"> Calculated</label>
                    <label><input type="radio" name="mode" value="interpolated"> NASA Interp.</label>
                </div>
            </div>
            <button id="calculate-btn" class="btn-primary">Calculate</button>
            <div id="status" class="status-text"></div>
        </aside>

        <!-- Main Content -->
        <main class="content">
            <!-- Tab Bar -->
            <nav class="tab-bar">
                <button class="tab active" data-tab="spectrum">Spectrum</button>
                <button class="tab" data-tab="angular">Angular</button>
                <button class="tab" data-tab="integrated">Integrated</button>
                <button class="tab" data-tab="compare">Compare</button>
                <button class="tab" data-tab="heatmap">Heatmap</button>
                <button class="tab" data-tab="validation">Validation</button>
                <button class="tab" data-tab="materials">Materials</button>
            </nav>

            <!-- Tab Panes -->
            <div class="tab-pane active" id="tab-spectrum">
                <div id="plot-spectrum" class="plot-container"></div>
            </div>
            <div class="tab-pane" id="tab-angular">
                <div class="inline-control">
                    <label>Photon Energy (MeV):
                        <input type="number" id="angular-photon-energy" min="0.01" step="0.01" value="0.5">
                    </label>
                    <button id="angular-calc-btn" class="btn-small">Update</button>
                </div>
                <div id="plot-angular" class="plot-container"></div>
            </div>
            <div class="tab-pane" id="tab-integrated">
                <div id="plot-integrated" class="plot-container"></div>
            </div>
            <div class="tab-pane" id="tab-compare">
                <div class="inline-control">
                    <label>Materials (check 2-5):
                        <span id="compare-checks"></span>
                    </label>
                    <button id="compare-calc-btn" class="btn-small">Compare</button>
                </div>
                <div id="plot-compare" class="plot-container"></div>
            </div>
            <div class="tab-pane" id="tab-heatmap">
                <div id="plot-heatmap" class="plot-container"></div>
            </div>
            <div class="tab-pane" id="tab-validation">
                <div class="inline-control">
                    <label>NASA grid:
                        <select id="val-energy">
                            <option value="0.50">0.50 MeV</option>
                            <option value="0.75">0.75 MeV</option>
                            <option value="1.00" selected>1.00 MeV</option>
                            <option value="2.00">2.00 MeV</option>
                            <option value="3.00">3.00 MeV</option>
                        </select>
                        <select id="val-angle">
                            <option value="0">0 deg</option>
                            <option value="30">30 deg</option>
                            <option value="60">60 deg</option>
                        </select>
                    </label>
                    <button id="val-calc-btn" class="btn-small">Validate</button>
                </div>
                <div id="plot-validation" class="plot-container"></div>
            </div>
            <div class="tab-pane" id="tab-materials">
                <div id="plot-materials" class="plot-container"></div>
            </div>
        </main>
    </div>
    <script src="/static/js/utils.js"></script>
    <script src="/static/js/controls.js"></script>
    <script src="/static/js/plots.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
